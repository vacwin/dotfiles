# main settings
set -g default-terminal "tmux-256color"
set -as terminal-features "tmux-256color:RGB"
set -ga terminal-overrides ',*:Ss=\E[%p1%d q:Se=\E[2 q'
setw -g mode-keys vi
set -g pane-base-index 1
set -g base-index 1
setw -g pane-base-index 1
set -g mouse on
set -g repeat-time 500
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "copy"
# plugins
set -g @plugin 'tmux-plugins/tpm'
# status
set -g status on
set -g status-position bottom
set -g status-interval 5
# status colors — Kanagawa Wave
set -g status-bg '#1f1f28'
set -g status-fg '#dcd7ba'
set -g status-right '#[fg=#7e9cd8]#($HOME/dotfiles/tmux/network.sh) #[fg=#727169]%a %d %b #[fg=#dcd7ba]%I:%M %p'
set -g status-right-length 100
set -g status-left '#[fg=#7fb4ca,bold]#S #[default]'
set -g status-left-length 40
set -g window-status-style 'fg=#727169,bg=default'
set -g window-status-format '#[fg=#727169]#I #[fg=#727169]#W'
set -g window-status-current-style 'fg=#dcd7ba,bg=#2a2a37,bold'
set -g window-status-current-format '#[fg=#e46876,bg=#2a2a37] #I:#W #[default]'
set -g pane-border-style 'fg=#2a2a37'
set -g pane-active-border-style 'fg=#7e9cd8'
set -g message-style 'fg=#dcd7ba,bg=#2a2a37'
set -g message-command-style 'fg=#dcd7ba,bg=#2a2a37'
setw -g mode-style 'fg=#1f1f28,bg=#e6c384'
# vim movement
bind c new-window -c "$HOME"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %
unbind C-e
# navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
# resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
# run tpm
run '~/.tmux/plugins/tpm/tpm'
