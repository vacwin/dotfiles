# main settings
set -g default-terminal "tmux-256color"
set -as terminal-features "tmux-256color:RGB"
set -ga terminal-overrides ',*:Ss=\E[%p1%d q:Se=\E[2 q'
setw -g mode-keys vi
set -g pane-base-index 1
set -g base-index 1
setw -g pane-base-index 1
set -g mouse on
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "copy"
# plugins
set -g @plugin 'tmux-plugins/tpm'
# status
set -g status on
set -g status-position bottom
set -g status-interval 5
# status colors
set -g status-bg '#0d1a1f'
set -g status-fg '#a8c4c8'
set -g status-right '#[fg=#2d6a72]%a %d %b #[fg=#3a9aaa]%I:%M %p'
set -g status-right-length 60
set -g status-left '#[fg=#2a8855,bold]#S #[default]'
set -g status-left-length 40
set -g window-status-style 'fg=#2d5060,bg=default'
set -g window-status-format '#[fg=#2d5060]#I #[fg=#5a9aaa]#W'
set -g window-status-current-style 'fg=#0d1a1f,bg=#1e3840,bold'
set -g window-status-current-format '#[fg=#a8c4c8,bg=#1e3840] #I:#W #[default]'
set -g pane-border-style 'fg=#1e3840'
set -g pane-active-border-style 'fg=#3a9aaa'
set -g message-style 'fg=#a8c4c8,bg=#1e3840'
set -g message-command-style 'fg=#a8c4c8,bg=#1e3840'
setw -g mode-style 'fg=#0d1a1f,bg=#3a9aaa'
# vim movement
bind c new-window -c "$HOME"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %
unbind C-e
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R
# run tpm
run '~/.tmux/plugins/tpm/tpm'
