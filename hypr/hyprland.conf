$mod = SUPER

# apps
bind = $mod, Return, exec, ghostty
bind = $mod, space, exec, tofi-drun --drun-launch=true
bind = $mod SHIFT, f, exec, MOZ_ENABLE_WAYLAND=1 firefox-esr
bind = $mod SHIFT, z, exec, /usr/bin/helium-browser
bind = $mod CTRL, q, exec, swaylock --config ~/.config/swaylock/config

# window management
bind = $mod, q, killactive
bind = $mod, f, fullscreen, 0
bind = $mod, v, layoutmsg, preselect d
bind = $mod, b, layoutmsg, preselect r

# reload
bind = $mod, c, exec, hyprctl reload

# focus (vim keys)
bind = $mod, h, movefocus, l
bind = $mod, j, movefocus, d
bind = $mod, k, movefocus, u
bind = $mod, l, movefocus, r

# move windows (vim keys)
bind = $mod SHIFT, h, movewindow, l
bind = $mod SHIFT, j, movewindow, d
bind = $mod SHIFT, k, movewindow, u
bind = $mod SHIFT, l, movewindow, r

# move windows (arrow keys)
bind = $mod SHIFT, left, movewindow, l
bind = $mod SHIFT, down, movewindow, d
bind = $mod SHIFT, up, movewindow, u
bind = $mod SHIFT, right, movewindow, r

# resize submap
bind = $mod SHIFT, r, submap, resize
submap = resize
binde = , h, resizeactive, -10 0
binde = , j, resizeactive, 0 10
binde = , k, resizeactive, 0 -10
binde = , l, resizeactive, 10 0
binde = , left, resizeactive, -10 0
binde = , down, resizeactive, 0 10
binde = , up, resizeactive, 0 -10
binde = , right, resizeactive, 10 0
bind = , Return, submap, reset
bind = , Escape, submap, reset
submap = reset

# workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

# move container to workspace
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# volume
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+ --limit 2.0 && ~/.config/eww/osd.sh volume
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%- && ~/.config/eww/osd.sh volume
bindl  = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle && ~/.config/eww/osd.sh volume
bindl  = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# brightness
bindel = , XF86MonBrightnessUp, exec, brightnessctl set +10% && ~/.config/eww/osd.sh brightness
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 10%- && ~/.config/eww/osd.sh brightness

# screenshots
bind = , Print, exec, grim ~/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png
bind = $mod, Print, exec, grim -g "$(slurp)" ~/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png
bind = SHIFT, Print, exec, grim - | copy
bind = $mod SHIFT, Print, exec, grim -g "$(slurp)" - | copy

# keyboard layout switch
bind = CTRL, space, exec, hyprctl switchxkblayout at-translated-set-2-keyboard next

# input
input {
    kb_layout = us,ru
    kb_options = ctrl:swapcaps

    touchpad {
        tap-to-click = true
        tap_button_map = lrm
        drag_lock = true
        natural_scroll = false
        disable_while_typing = true
        scroll_factor = 1.0
    }

    accel_profile = adaptive
    sensitivity = 0.0
}

# wallpaper
exec-once = hyprpaper

# autostart
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = mako
exec-once = kanshi
exec-once = eww daemon
exec-once = waybar

general {
    gaps_in = 4
    gaps_out = 8
    border_size = 1
}

decoration {
    rounding = 4
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
}
