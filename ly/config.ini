# Rose Pine theme
# 0xSSRRGGBB — SS: styling (01=bold, 02=underline...), RRGGBB: hex color
# 0x00000000 — use terminal default

# Colors
bg         = 0x00191724   # Rose Pine base
fg         = 0x00e0def4   # Rose Pine text
border_fg  = 0x00908caa   # Rose Pine subtle
error_bg   = 0x00191724   # Rose Pine base
error_fg   = 0x01eb6f92   # Rose Pine love (bold)

# Clean/minimalist
hide_version_string  = true
hide_keyboard_locks  = true
hide_key_hints       = true
blank_box            = false
box_title            = null
clock                = %I:%M %p %a

# Input
asterisk     = •
input_len    = 28
default_input = login
save         = true

animation = none
