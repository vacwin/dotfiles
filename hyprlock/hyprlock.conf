# Rose Pine
# base:    #191724
# text:    #e0def4
# subtle:  #908caa
# love:    #eb6f92
# surface: #1f1d2e

general {
    hide_cursor = true
    grace = 0
}

background {
    monitor =
    color = rgb(191724)
    blur_passes = 2
    blur_size = 4
    brightness = 0.7
}

input-field {
    monitor =
    size = 280, 48
    position = 0, -80
    halign = center
    valign = center

    outline_thickness = 1
    outer_color = rgb(908caa)
    inner_color = rgb(1f1d2e)
    font_color = rgb(e0def4)
    check_color = rgb(31748f)
    fail_color = rgb(eb6f92)

    fade_on_empty = true
    placeholder_text =
    hide_input = false
    dots_size = 0.25
    dots_spacing = 0.3
    rounding = 4
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%I:%M %p")"
    color = rgb(e0def4)
    font_size = 64
    font_family = monospace
    position = 0, 80
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] echo "$(date +"%A, %d %B")"
    color = rgb(908caa)
    font_size = 14
    font_family = monospace
    position = 0, 10
    halign = center
    valign = center
}
